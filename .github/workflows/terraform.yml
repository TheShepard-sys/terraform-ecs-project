name: Terraform Deploy

on:
  push:
    branches:
      - main

permissions:
   id-token: write
   contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-west-2

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan -lock-timeout=200s -var-file="environments/dev/terraform.tfvars"

      - name: Terraform Apply
        run: terraform apply -lock-timeout=200s -auto-approve -var-file="environments/dev/terraform.tfvars"
